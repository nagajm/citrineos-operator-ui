name: Build & Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Create .env.local for build
        run: |
          cat > .env.local << EOF
          GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }}
          GOOGLE_MAPS_LOCATION_PICKER_MAP_ID=${{ secrets.GOOGLE_MAPS_API_KEY }}
          GOOGLE_MAPS_ADDRESS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }}
          HASURA_ADMIN_SECRET=${{ secrets.HASURA_ADMIN_SECRET }}
          NEXT_PUBLIC_HASURA_ADMIN_SECRET=${{ secrets.HASURA_ADMIN_SECRET }}
          NEXT_PUBLIC_DEFAULT_MAP_CENTER_LATITUDE=20.5937
          NEXT_PUBLIC_DEFAULT_MAP_CENTER_LONGITUDE=78.9629
          NEXT_PUBLIC_API_URL=https://app.zappoevcharging.com/hasura/v1/graphql
          NEXT_PUBLIC_WS_URL=wss://app.zappoevcharging.com/hasura/v1/graphql
          NEXT_PUBLIC_CITRINE_CORE_URL=http://65.0.157.6:8080
          NEXT_PUBLIC_FILE_SERVER_URL=http://65.0.157.6:9000
          NEXT_PUBLIC_LOGO_URL=https://d1h8867rcwtfcw.cloudfront.net/logo-collapsed.svg
          NEXT_PUBLIC_ADMIN_EMAIL=jagan.mjm@gmail.com
          NEXT_PUBLIC_BANNER_MESSAGE=EV Charging Management System
          NEXTAUTH_URL=https://app.zappoevcharging.com
          NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
          ALLOW_IMAGE_UPLOAD=false
          ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
          VOLTSTATION_API_URL=${{ secrets.VOLTSTATION_API_URL }}
          VOLTSTATION_ADMIN_API_KEY=${{ secrets.VOLTSTATION_ADMIN_API_KEY }}
          EOF

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3.3.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/citrineos-core
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            # Write runtime env vars for citrine-ui container
            cat > .env.ui << 'ENVEOF'
            HASURA_ADMIN_SECRET=${{ secrets.HASURA_ADMIN_SECRET }}
            NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
            NEXTAUTH_URL=https://app.zappoevcharging.com
            GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }}
            GOOGLE_MAPS_LOCATION_PICKER_MAP_ID=${{ secrets.GOOGLE_MAPS_API_KEY }}
            GOOGLE_MAPS_ADDRESS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }}
            ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
            ALLOW_IMAGE_UPLOAD=false
            VOLTSTATION_API_URL=${{ secrets.VOLTSTATION_API_URL }}
            VOLTSTATION_ADMIN_API_KEY=${{ secrets.VOLTSTATION_ADMIN_API_KEY }}
            ZAPPO_API_URL=${{ secrets.ZAPPO_API_URL }}
            ZAPPO_ADMIN_API_KEY=${{ secrets.ZAPPO_ADMIN_API_KEY }}
            ENVEOF
            docker compose pull citrine-ui
            docker compose up -d citrine-ui
            docker image prune -f
